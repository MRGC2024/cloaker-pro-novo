<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Entrar — Cloaker Pro</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M16 7l7 4v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9v-6l7-4z' fill='none' stroke='%23fff' stroke-width='1.8' stroke-linejoin='round'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #030308;
      --cyan: #22d3ee;
      --violet: #818cf8;
      --indigo: #6366f1;
      --magenta: #c084fc;
      --text: #f4f4f5;
      --muted: #94a3b8;
      --dim: #64748b;
      --glass: rgba(8, 8, 16, 0.72);
      --glass-border: rgba(129, 140, 248, 0.22);
      --danger: #f87171;
    }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      overflow: hidden;
      position: relative;
    }

    /* —— Background futurista —— */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: orbFloat 14s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.55), transparent 70%);
      top: -120px; left: 50%;
      transform: translateX(-50%);
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.35), transparent 70%);
      bottom: -80px; right: -60px;
      animation-delay: -4s;
    }
    .bg-orb-3 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(192, 132, 252, 0.3), transparent 70%);
      bottom: 20%; left: -80px;
      animation-delay: -8s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -15px) scale(1.05); }
      66% { transform: translate(-15px, 10px) scale(0.95); }
    }
    .bg-orb-1 { animation-name: orbFloatCenter; }
    @keyframes orbFloatCenter {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(25px); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 20%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 20%, transparent 75%);
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .bg-horizon {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 45%;
      background: linear-gradient(to top, rgba(99, 102, 241, 0.12) 0%, transparent 100%);
      transform: perspective(500px) rotateX(60deg);
      transform-origin: bottom;
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
    }

    /* —— Layout —— */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-glow {
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--cyan), var(--indigo), var(--magenta), var(--cyan));
      background-size: 300% 300%;
      animation: borderGlow 6s ease infinite;
      opacity: 0.65;
      filter: blur(1px);
    }
    @keyframes borderGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .login-card {
      position: relative;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 42px 38px 38px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 32px 64px rgba(0, 0, 0, 0.55),
        0 0 80px rgba(99, 102, 241, 0.08);
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 22px 28px; border-radius: 20px; }
    }

    /* —— Brand —— */
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-ring {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
    }
    .brand-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: var(--cyan);
      border-right-color: var(--indigo);
      animation: spin 4s linear infinite;
    }
    .brand-ring::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed rgba(129, 140, 248, 0.25);
      animation: spin 12s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand-mark {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(129, 140, 248, 0.25), rgba(99, 102, 241, 0.08));
      border: 1px solid rgba(129, 140, 248, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #fff;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.4), 0 0 60px rgba(34, 211, 238, 0.12);
      position: relative;
      z-index: 1;
    }
    .brand h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #fff 0%, var(--violet) 50%, var(--cyan) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 8px;
    }
    .brand-tag .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .brand p { font-size: 14px; color: var(--muted); }

    /* —— Form —— */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .form-label i { font-size: 14px; color: var(--indigo); }
    .input-wrap { position: relative; }
    .input-wrap > i.field-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-size: 18px;
      pointer-events: none;
      transition: color 0.25s;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(0, 0, 0, 0.45);
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .form-input::placeholder { color: #475569; }
    .form-input:focus {
      outline: none;
      border-color: rgba(34, 211, 238, 0.45);
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1), 0 0 24px rgba(99, 102, 241, 0.15);
    }
    .input-wrap:focus-within > i.field-icon { color: var(--cyan); }

    .btn-login {
      position: relative;
      width: 100%;
      padding: 15px 20px;
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid rgba(129, 140, 248, 0.4);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.9) 0%, rgba(79, 70, 229, 0.95) 50%, rgba(34, 211, 238, 0.25) 100%);
      background-size: 200% 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.35), 0 0 40px rgba(34, 211, 238, 0.08);
    }
    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { left: -100%; }
      40%, 100% { left: 150%; }
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.45), 0 0 50px rgba(34, 211, 238, 0.15);
    }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn-login span, .btn-login i { position: relative; z-index: 1; }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      display: none;
    }
    .msg.error {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: #fecaca;
    }
    .msg.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: #86efac;
    }

    #setupBox {
      display: none;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid rgba(129, 140, 248, 0.15);
    }
    .setup-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--magenta);
      background: rgba(192, 132, 252, 0.1);
      border: 1px solid rgba(192, 132, 252, 0.3);
      padding: 5px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .setup-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.55;
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--dim);
    }
    .footer-note span { color: rgba(34, 211, 238, 0.7); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-scene" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>
    <div class="bg-horizon"></div>
    <div class="scanline"></div>
  </div>

  <div class="login-wrap">
    <div class="card-glow" aria-hidden="true"></div>
    <div class="login-card">
      <div class="brand">
        <div class="brand-ring">
          <div class="brand-mark"><i class="ri-shield-check-line"></i></div>
        </div>
        <div class="brand-tag"><span class="dot"></span> Secure access</div>
        <h1>Cloaker Pro</h1>
        <p>Painel de controle · tráfego protegido</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username"><i class="ri-fingerprint-line"></i> Identificação</label>
          <div class="input-wrap">
            <i class="ri-user-3-line field-icon"></i>
            <input type="text" class="form-input" id="username" name="username" required autocomplete="username" placeholder="Usuário">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password"><i class="ri-key-2-line"></i> Chave de acesso</label>
          <div class="input-wrap">
            <i class="ri-lock-2-line field-icon"></i>
            <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password" placeholder="Senha">
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="ri-login-circle-line"></i>
          <span>Iniciar sessão</span>
        </button>
        <div id="loginMsg" class="msg"></div>
      </form>

      <div id="setupBox">
        <div class="setup-badge"><i class="ri-cpu-line"></i> Primeiro boot</div>
        <div class="setup-title">Sistema sem administrador. Configure a conta principal:</div>
        <form id="setupForm">
          <div class="form-group">
            <label class="form-label" for="setupUsername"><i class="ri-user-star-line"></i> Usuário admin</label>
            <div class="input-wrap">
              <i class="ri-user-star-line field-icon"></i>
              <input type="text" class="form-input" id="setupUsername" required minlength="2" placeholder="admin">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="setupPassword"><i class="ri-lock-password-line"></i> Senha</label>
            <div class="input-wrap">
              <i class="ri-lock-password-line field-icon"></i>
              <input type="password" class="form-input" id="setupPassword" required minlength="6" placeholder="Mín. 6 caracteres">
            </div>
          </div>
          <button type="submit" class="btn-login">
            <i class="ri-shield-user-line"></i>
            <span>Criar administrador</span>
          </button>
          <div id="setupMsg" class="msg"></div>
        </form>
      </div>
    </div>
    <p class="footer-note"><span>◈</span> ENCRYPTED · BRT · RESTRICTED</p>
  </div>

  <script>
    var loginMsg = document.getElementById('loginMsg');
    var setupBox = document.getElementById('setupBox');
    var setupMsg = document.getElementById('setupMsg');
    var loginBtn = document.getElementById('loginBtn');

    fetch('/api/me', { credentials: 'include' }).then(function(r) {
      if (r.ok) { window.location.href = '/'; return; }
      return fetch('/api/setup/check', { credentials: 'include' }).then(function(r2) { return r2.ok ? r2.json() : {}; });
    }).then(function(data) {
      if (data && data.setupRequired) setupBox.style.display = 'block';
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      loginMsg.className = 'msg';
      loginMsg.textContent = '';
      loginBtn.disabled = true;
      var form = e.target;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username: form.username.value.trim(), password: form.password.value })
      }).then(function(r) {
        return r.json().then(function(data) {
          if (r.ok) { window.location.href = '/'; return; }
          loginMsg.className = 'msg error';
          loginMsg.innerHTML = '<i class="ri-error-warning-line"></i><span>' + (data.error || 'Credenciais inválidas') + '</span>';
          loginBtn.disabled = false;
        });
      }).catch(function() {
        loginMsg.className = 'msg error';
        loginMsg.innerHTML = '<i class="ri-wifi-off-line"></i><span>Erro de conexão. Tente novamente.</span>';
        loginBtn.disabled = false;
      });
    });

    document.getElementById('setupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      setupMsg.className = 'msg';
      setupMsg.textContent = '';
      var form = e.target;
      fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username: form.setupUsername.value.trim(), password: form.setupPassword.value })
      }).then(function(r) {
        return r.json().then(function(data) {
          if (r.ok) { window.location.href = '/'; return; }
          setupMsg.className = 'msg error';
          setupMsg.innerHTML = '<i class="ri-error-warning-line"></i><span>' + (data.error || 'Erro ao criar administrador') + '</span>';
        });
      }).catch(function() {
        setupMsg.className = 'msg error';
        setupMsg.innerHTML = '<i class="ri-wifi-off-line"></i><span>Erro de conexão</span>';
      });
    });
  </script>
</body>
</html>
